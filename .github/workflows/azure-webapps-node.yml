name: Deploy to Azure Web App (Frontend)

on:
  push:
    branches:
      - devops
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-checks:
    name: 🧪 CI Checks (Lint & Build)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install All Dependencies (Root + Backend + Frontend tools)
        # npm ci установит и бэкенд (через cd backend), и vite (из корня)
        run: |
          npm ci
          cd ./backend && npm ci

      - name: 🧹 Run ESLint
        # Линтер запускаем относительно корня или конкретной папки, если нужно
        run: npm run lint

      - name: 🏗️ Build Frontend for Production
        # Скрипт build из package.json сам зайдет в ./frontend и запустит vite build
        run: npm run build

      - name: ✅ Save Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/dist
          retention-days: 1

  deploy-azure:
    name: 🚀 Deploy to Azure
    needs: ci-checks
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟨 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Download Frontend Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend/dist

      - name: 📦 Deploy to Azure Web App
        id: deploy-to-azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: \${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: \${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./frontend/dist

      - name: 🔗 Output App URL
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Your app is live at: https://\${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
