version: '3.8'
services:
  web:
    build: .
    command: gunicorn -b 0.0.0.0:8000 wsgi:app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pcamkr
    depends_on:
      - db
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: pcamkr
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
