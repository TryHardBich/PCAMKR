<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Категории</title>

  <link rel="stylesheet" href="styles/catalog.css">
</head>

<body>

<a href="index.html" class="back-btn">← На главную</a>

<h1>Категории комплектующих</h1>

<div class="category-grid">

  <div class="category-card" onclick="openCategory('cpu')">
    <img src="icons/cpu.svg" class="cat-icon">
    <p>Процессоры</p>
  </div>

  <div class="category-card" onclick="openCategory('gpu')">
    <img src="icons/gpu.svg" class="cat-icon">
    <p>Видеокарты</p>
  </div>

  <div class="category-card" onclick="openCategory('motherboard')">
    <img src="icons/motherboard.svg" class="cat-icon">
    <p>Материнские платы</p>
  </div>

  <div class="category-card" onclick="openCategory('ram')">
    <img src="icons/ram.svg" class="cat-icon">
    <p>Оперативная память</p>
  </div>

  <div class="category-card" onclick="openCategory('storage')">
    <img src="icons/storage.svg" class="cat-icon">
    <p>Накопители</p>
  </div>

  <div class="category-card" onclick="openCategory('psu')">
    <img src="icons/psu.svg" class="cat-icon">
    <p>Блоки питания</p>
  </div>

  <div class="category-card" onclick="openCategory('cooler')">
    <img src="icons/cooler.svg" class="cat-icon">
    <p>Охлаждение</p>
  </div>

  <div class="category-card" onclick="openCategory('case')">
    <img src="icons/case.svg" class="cat-icon">
    <p>Корпуса</p>
  </div>

</div>

<script>
function openCategory(cat) {
  window.location.href = `list.html?category=${cat}`;
}
</script>

</body>
</html>
