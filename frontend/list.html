<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор комплектующих</title>

    <link rel="stylesheet" href="styles/list.css">
</head>

<body>

<div class="page">

    <header class="page-header">
        <a href="builder.html" class="back-btn">← Назад к сборке</a>
        <a href="catalog.html" class="back-btn">← Назад</a>
        <h1 id="title">Категория</h1>
    </header>

    <!-- Модалка совместимости -->
    <div id="compatModal" class="compat-modal">
        <div class="compat-modal-content">
            <h3>Несовместимо</h3>
            <p id="compatModalText"></p>

            <div class="compat-buttons">
                <button id="compatModalClose">Понятно</button>
                <button id="compatForceAdd">Все равно добавить</button>
            </div>
        </div>
    </div>

    <main class="layout">

        <!-- Фильтры -->
        <aside class="filters">
            <h2 class="filters-title">Фильтры</h2>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск...">
            </div>

            <div class="filter-block" data-filter="price">
                <label>Цена от:</label>
                <input type="number" id="priceMin" placeholder="0">
            </div>
            
            <div class="filter-block" data-filter="price">
                <label>Цена до:</label>
                <input type="number" id="priceMax" placeholder="∞">
            </div>

            <div class="filter-block" data-filter="generation">
                <label>Поколение:</label>
                <select id="generationFilter">
                    <option value="">Все</option>
                </select>
            </div>

            <div class="filter-block" data-filter="brand">
                <label>Бренд:</label>
                <select id="brandFilter">
                    <option value="">Все</option>
                </select>
            </div>

            <div class="filter-block" data-filter="socket">
                <label>Сокет:</label>
                <select id="socketFilter">
                    <option value="">Все</option>
                </select>
            </div>

            <div class="filter-block" data-filter="model">
                <label>Модель:</label>
                <select id="modelFilter">
                    <option value="">Все</option>
                </select>
            </div>

            <div class="filter-block" data-filter="type">
                <label>Тип накопителя:</label>
                <select id="typeFilter">
                    <option value="">Все</option>
                    <option value="SSD">SSD</option>
                    <option value="HDD">HDD</option>
                </select>
            </div>

            <div class="filters-buttons">
                <button id="clearFilters" class="filter-btn secondary">Сбросить фильтры</button>
                <button id="toggleCompatible" class="filter-btn secondary">Показать только совместимые</button>
            </div>
        </aside>

        <!-- Список товаров -->
        <section class="products-wrapper">
            <div id="itemsList" class="items-list"></div>

            <!-- Пагинация -->
            <div id="pagination" class="pagination"></div>
        </section>

    </main>
</div>

<script src="scripts/list.js"></script>
</body>
</html>
