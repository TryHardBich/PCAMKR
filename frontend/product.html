<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар</title>
  <link rel="stylesheet" href="styles/product.css">
</head>

<body>

<a href="javascript:history.back()" class="back-btn">← Назад</a>

<h1 id="name"></h1>

<div class="product-wrapper">
  <img id="productImage" class="product-image" src="" alt="Фото товара">

  <div class="product-info">
    <p class="price" id="price"></p>

    <h2 class="section-title">Основные характеристики</h2>
    <div id="specs"></div>

    <h2 class="section-title">Описание</h2>
    <p id="description"></p>

    <a id="addToBuild" class="add-btn">Добавить в сборку</a>
  </div>
</div>

<!-- МОДАЛКА "ДОБАВЛЕНО В СБОРКУ" -->
<div id="addedModal" class="added-modal">
  <div class="added-modal-content">
    <h2>Добавлено в сборку</h2>

    <div class="added-buttons">
      <a href="builder.html" class="go-builder">Перейти к сборщику</a>
      <button class="stay-here" onclick="closeAddedModal()">Остаться на странице</button>
    </div>
  </div>
</div>

<script src="scripts/product.js"></script>
<script>
  function closeAddedModal() {
    document.getElementById('addedModal').classList.remove('show');
  }
</script>
</body>
</html>
