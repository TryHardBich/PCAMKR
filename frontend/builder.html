<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сборщик ПК</title>

  <link rel="stylesheet" href="styles/builder.css">
</head>
<div id="compatModal" class="compat-modal">
  <div class="compat-modal-content">
    <h3>Ошибка совместимости</h3>
    <p id="compatModalText"></p>
    <button id="compatModalClose">Понятно</button>
  </div>
</div>

<body>

<a href="index.html" class="back-btn">← На главную</a>

<h1>Сборщик ПК</h1>

<div class="builder-layout">

  <!-- ЛЕВАЯ ПАНЕЛЬ -->
  <div class="summary-panel">
    <h2>Сборка</h2>

    <table class="summary-table">
      <tbody id="summaryTable"></tbody>
    </table>

    <div class="total">
      Итого: <span id="totalPrice">0 ₽</span>
    </div>

    <button class="save-btn">Сохранить сборку</button>
  </div>

  <!-- ПРАВАЯ ПАНЕЛЬ -->
  <div class="parts-table-container">
    <table class="parts-table">
      <thead>
        <tr>
          <th>Компонент</th>
          <th>Действия</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody id="partsList"></tbody>
    </table>
  </div>

</div>

<script src="scripts/builder.js"></script>
</body>
</html>
